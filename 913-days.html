<!DOCTYPE html>
<html>
<head>

<title>

913 Days
</title>


<style>

body{
font-family: Arial;
text-align: center;
margin-top:100px;
background-color:white;


}

button{
padding: 15px 30px;
font-size: 20px;
background-color: purple;
color: white;
border:none;
cursor: pointer;



}


.celebrate{

background-color: gold;

}







</style>




</head>
<body>

<h1 id="title">913 Days of learning German</h1>

<p id="message">Consistency is my superpower</p>


<button id="btn">Celebrate</button>



<script>
let btn=document.getElementById("btn");
btn.addEventListener("click", function(){

document.body.style.backgroundColor="lightpink";

document.getElementById("message").innerText="913 days and still going";

document.getElementById("title").style.fontSize="50px";

btn.style.backgroundColor="orange";



});

</script>

</body>

</html>
